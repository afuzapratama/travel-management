<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#shine)"/>
  <!-- Plane (departure style, tilted upward) -->
  <g transform="translate(32,34) rotate(-30)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="16" ry="4.5" fill="white"/>
    <!-- Nose -->
    <path d="M16,-1.5 Q22,0 16,1.5" fill="white"/>
    <!-- Top wing -->
    <path d="M-2,-4 L6,-16 L10,-15 L4,-4Z" fill="white" opacity="0.95"/>
    <!-- Bottom wing -->
    <path d="M-2,4 L6,16 L10,15 L4,4Z" fill="white" opacity="0.95"/>
    <!-- Tail top -->
    <path d="M-14,-4 L-18,-12 L-12,-11 L-11,-4Z" fill="white" opacity="0.9"/>
    <!-- Tail bottom -->
    <path d="M-14,4 L-18,12 L-12,11 L-11,4Z" fill="white" opacity="0.9"/>
  </g>
  <!-- Trail lines (departure feel) -->
  <line x1="8" y1="46" x2="22" y2="40" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="50" x2="18" y2="46" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="5" y1="54" x2="14" y2="51" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
</svg>

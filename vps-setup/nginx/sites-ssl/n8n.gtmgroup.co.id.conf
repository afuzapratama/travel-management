# ============================================
# Nginx — n8n.gtmgroup.co.id → n8n
# HTTPS with Let's Encrypt SSL
# ============================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name n8n.gtmgroup.co.id;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name n8n.gtmgroup.co.id;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/n8n.gtmgroup.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.gtmgroup.co.id/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max body size (PDF attachments via webhook can be large)
    client_max_body_size 50M;

    # Proxy to n8n
    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
